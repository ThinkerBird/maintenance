<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Under Maintenance</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #020617, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 40px 32px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    .icon {
      font-size: 46px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      letter-spacing: 0.4px;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .status {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    footer {
      margin-top: 22px;
      font-size: 13px;
      color: #6b7280;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 22px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">🛠️</div>

    <h1>We’ll Be Back Soon</h1>

    <p>
      The service is temporarily unavailable while we perform some maintenance
      and improvements. Everything will be back online shortly.
    </p>

    <div class="status">Maintenance in progress</div>

    <footer>
      © <span id="year"></span> FNAO DATA BUNDLE
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
